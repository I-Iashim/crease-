<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed — Crease Edits</title>
<meta name="description" content="Your Crease Edits order has been placed.">
<link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body data-page="order-success.html">
  <div class="page-loader"><div class="mark">Crease Edits</div><div class="bar"></div></div>
  <header id="site-header"></header>

  <main id="main">
    <section style="padding-top: calc(var(--nav-h) + var(--sp-6)); min-height:70vh;">
      <div class="container text-center reveal-zoom is-visible" style="max-width:520px;">
        <div class="float" style="font-size:3.4rem; margin-bottom:1rem;">✅</div>
        <p class="eyebrow" style="justify-content:center;">Step 3 of 3</p>
        <h1>Order Confirmed</h1>
        <p class="muted">Thank you — your order <strong id="orderId"></strong> has been placed. A confirmation has been sent to your email.</p>
        <div class="glass-card" style="padding: var(--sp-4); text-align:left; margin: var(--sp-4) 0;">
          <div class="flex justify-between" style="padding:.3rem 0;"><span class="muted">Order date</span><span id="orderDate"></span></div>
          <div class="flex justify-between" style="padding:.3rem 0;"><span class="muted">Items</span><span id="orderItems"></span></div>
          <div class="flex justify-between" style="padding:.3rem 0; font-weight:700;"><span>Total paid</span><span id="orderTotal"></span></div>
        </div>
        <div class="flex gap-3" style="justify-content:center;">
          <a href="shop.html" class="btn btn-outline">Continue Shopping</a>
          <a href="profile.html" class="btn btn-primary">View Orders</a>
        </div>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script src="js/products-data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/wishlist.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener("components:ready", () => {
      const order = JSON.parse(localStorage.getItem("ce_last_order") || "null");
      if (order){
        const itemCount = Array.isArray(order.items) ? order.items.reduce((s,i)=>s+i.qty,0) : order.items;
        document.getElementById("orderId").textContent = "#" + order.id;
        document.getElementById("orderDate").textContent = order.createdAt ? new Date(order.createdAt).toLocaleDateString() : order.date;
        document.getElementById("orderItems").textContent = itemCount;
        document.getElementById("orderTotal").textContent = "$" + order.total.toFixed(2);
      } else {
        document.getElementById("orderId").textContent = "#000000";
      }
    });
  </script>
</body>
</html>

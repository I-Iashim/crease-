<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account — Crease Edits</title>
<meta name="description" content="Manage your Crease Edits account and view order history.">
<link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body data-page="profile.html">
  <div class="page-loader"><div class="mark">Crease Edits</div><div class="bar"></div></div>
  <header id="site-header"></header>

  <main id="main">
    <section class="page-hero">
      <div class="container">
        <p class="eyebrow" style="justify-content:center;">Account</p>
        <h1>My Account</h1>
      </div>
    </section>

    <section style="padding-top:0;" id="profileWrap">
      <div class="container grid grid-2" style="align-items:start; grid-template-columns: 1fr 2fr;">
        <div class="glass-card text-center reveal-left" style="padding: var(--sp-5);">
          <div style="width:84px;height:84px;border-radius:50%;background:var(--ink);color:var(--cream);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:2rem;margin:0 auto var(--sp-3);" id="profileInitial"></div>
          <h3 id="profileName" style="margin-bottom:.2rem;"></h3>
          <p class="muted" id="profileEmail"></p>
          <button class="btn btn-outline btn-block" id="logoutBtn" style="margin-top: var(--sp-3);">Log Out</button>
        </div>
        <div class="reveal-right">
          <div class="glass-card" style="padding: var(--sp-4); margin-bottom: var(--sp-4);">
            <h3>Wishlist &amp; Cart</h3>
            <div class="flex gap-3">
              <a href="wishlist.html" class="btn btn-ghost btn-sm">View Wishlist</a>
              <a href="cart.html" class="btn btn-ghost btn-sm">View Cart</a>
            </div>
          </div>
          <div class="glass-card" style="padding: var(--sp-4);">
            <h3>Order History</h3>
            <div id="orderHistory"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script src="js/products-data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/wishlist.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>

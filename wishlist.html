<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Wishlist — Crease Edits</title>
<meta name="description" content="Products you've saved for later at Crease Edits.">
<link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body data-page="wishlist.html">
  <div class="page-loader"><div class="mark">Crease Edits</div><div class="bar"></div></div>
  <a href="#main" class="skip-link">Skip to content</a>
  <header id="site-header"></header>

  <main id="main">
    <section class="page-hero">
      <div class="container">
        <div class="breadcrumbs"><a href="index.html">Home</a> / Wishlist</div>
        <p class="eyebrow" style="justify-content:center;">Saved for later</p>
        <h1>Your Wishlist</h1>
      </div>
    </section>

    <section style="padding-top:0;">
      <div class="container">
        <div class="grid grid-4" id="wishlistGrid"></div>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script src="js/products-data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/wishlist.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/main.js"></script>
  <script src="js/shop.js"></script>
  <script>
    function renderWishlistPage(){
      const grid = document.getElementById("wishlistGrid");
      const items = CreaseEditsWishlist.products();
      if (!items.length){
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
          <div class="icon">♡</div>
          <h3>Your wishlist is empty</h3>
          <p class="muted">Tap the heart on any product to save it here.</p>
          <a href="shop.html" class="btn btn-primary">Browse the Shop</a>
        </div>`;
        return;
      }
      window.renderProductRail("wishlistGrid", items);
    }
    document.addEventListener("components:ready", renderWishlistPage);
    document.addEventListener("wishlist:updated", renderWishlistPage);
  </script>
</body>
</html>
